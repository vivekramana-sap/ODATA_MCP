---
applications:
  - name: jam-odata-mcp-bridge-v2
    buildpacks:
      - python_buildpack
    memory: 256M
    instances: 1
    command: python3 server_new.py --host 0.0.0.0
    health-check-type: http
    health-check-http-endpoint: /health
    routes:
      - route: jam-odata-mcp-bridge-v2.${default-domain}
    env:
      CONFIG_FILE: services.json
      IDP_HINT: "${IDP_HINT}"
    services:
      - jam-odata-mcp-connectivity-v2
      - jam-odata-mcp-destination-v2
      - jam-odata-mcp-xsuaa-v2
