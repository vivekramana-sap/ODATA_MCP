_schema-version: "3.2"
ID: jam-odata-mcp-bridge
description: JAM OData MCP Bridge — multi-service MCP server for SAP OData
version: 0.0.1

modules:
  - name: jam-odata-mcp-bridge
    type: python
    path: .
    parameters:
      buildpack: python_buildpack
      memory: 256M
      instances: 1
      command: python3 server_new.py --passthrough --host 0.0.0.0 --i-am-security-expert
      health-check-type: http
      health-check-http-endpoint: /health
    properties:
      CONFIG_FILE: services.json
      ODATA_USERNAME: ""
      ODATA_PASSWORD: ""
    requires:
      - name: jam-odata-mcp-connectivity
      - name: jam-odata-mcp-destination
    build-parameters:
      supported-platforms: [CF]
      ignore:
        - ".jam-odata-mcp-bridge_mta_build_tmp/"
        - "mta_archives/"
        - "*.mtar"
        - "Makefile_*.mta"
        - "env"
        - "credentials.mtaext"
        - "credentials.mtaext.template"
        - "configurator.py"
        - "ui/"
        - "patches.py"
        - "deploy.sh"
        - "docker"
        - "server.py"
        - "__pycache__/"
        - "*.pyc"
        - ".git/"
        - ".claude/"
        - "*.md"

resources:
  - name: jam-odata-mcp-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite

  - name: jam-odata-mcp-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

parameters:
  enable-parallel-deployments: true
