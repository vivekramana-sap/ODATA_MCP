_schema-version: "3.2"
ID: jam-odata-mcp-bridge-v2
description: JAM OData MCP Bridge v2 — improved AI-agent tools for SAP OData
version: 0.2.0

modules:
  - name: jam-odata-mcp-bridge-v2
    type: python
    path: .
    parameters:
      buildpack: python_buildpack
      memory: 256M
      instances: 1
      command: python3 server.py --host 0.0.0.0 --i-am-security-expert
      health-check-type: http
      health-check-http-endpoint: /health
      routes:
        - route: jam-odata-mcp-bridge-v2.${default-domain}
    properties:
      CONFIG_FILE: services.json
      ODATA_USERNAME: ""
      ODATA_PASSWORD: ""
      IDP_HINT: ""
    requires:
      - name: jam-odata-mcp-connectivity-v2
      - name: jam-odata-mcp-destination-v2
      - name: jam-odata-mcp-xsuaa-v2
        parameters:
          credential-type: instance-secret
    build-parameters:
      supported-platforms: [CF]
      ignore:
        - ".jam-odata-mcp-bridge_mta_build_tmp/"
        - "mta_archives/"
        - "*.mtar"
        - "Makefile_*.mta"
        - "env"
        - "credentials.mtaext"
        - "credentials.mtaext.template"
        - "configurator.py"
        - "ui/"
        - "patches.py"
        - "deploy.sh"
        - "Dockerfile"
        - "tests/"
        - "docs/"
        - "__pycache__/"
        - "*.pyc"
        - ".git/"
        - ".claude/"
        - "*.md"

resources:
  - name: jam-odata-mcp-connectivity-v2
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite

  - name: jam-odata-mcp-destination-v2
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  - name: jam-odata-mcp-xsuaa-v2
    type: org.cloudfoundry.managed-service
    parameters:
      service:      xsuaa
      service-plan: application
      path:         ./xs-security.json

parameters:
  enable-parallel-deployments: true
