<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JAM OData MCP Bridge — Configurator</title>
  <script id="sap-ui-bootstrap"
    src="https://sdk.openui5.org/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-libs="sap.m, sap.ui.layout, sap.ui.core, sap.ui.unified, sap.f, sap.tnt"
    data-sap-ui-compatVersion="edge"
    data-sap-ui-async="true"
    data-sap-ui-oninit="onUI5Init"
    data-sap-ui-xx-waitForTheme="true">
  </script>
  <style>
    .bridgeLogPanel { background: #1e2227; border-radius: .5rem; padding: 1rem;
      font-family: monospace; font-size: .8125rem; color: #98c379; max-height: 25rem; overflow-y: auto; }
    .bridgeLogPanel .logErr { color: #e06c75; }
    .responsePanel { background: #1e2227; border-radius: .5rem; padding: 1rem;
      font-family: monospace; font-size: .8125rem; color: #abb2bf; max-height: 26rem;
      overflow: auto; white-space: pre-wrap; word-break: break-all; }
    .sapMShell .sapMShellBrandingBar { display: none; }
    .svcUrlText { font-family: monospace; font-size: .75rem; color: #6a6d70; word-break: break-all; }
    .toolNameMono { font-family: monospace; font-weight: 700; }
    .fieldMeta { font-size: .6875rem; color: #6a6d70; }
  </style>
  <script>
    /* ================================================================
       JAM OData MCP Bridge — SAPUI5 Fiori Configurator
       ================================================================ */
    function onUI5Init() {
      sap.ui.require([
        "sap/m/Shell", "sap/m/App", "sap/m/Page", "sap/m/IconTabBar",
        "sap/m/IconTabFilter", "sap/m/Button", "sap/m/Input", "sap/m/Label",
        "sap/m/Switch", "sap/m/Text", "sap/m/Title", "sap/m/List",
        "sap/m/StandardListItem", "sap/m/CustomListItem", "sap/m/Dialog",
        "sap/m/MessageToast", "sap/m/VBox", "sap/m/HBox", "sap/m/FlexBox",
        "sap/m/Panel", "sap/m/ObjectStatus", "sap/m/ObjectNumber",
        "sap/m/SearchField", "sap/m/Toolbar", "sap/m/ToolbarSpacer",
        "sap/m/CheckBox", "sap/m/ScrollContainer", "sap/m/ObjectIdentifier",
        "sap/m/Bar", "sap/m/OverflowToolbar", "sap/m/GenericTag",
        "sap/m/ObjectAttribute", "sap/m/Link", "sap/m/MessageStrip",
        "sap/m/TextArea", "sap/m/StepInput", "sap/m/Slider",
        "sap/m/SplitContainer", "sap/m/IconTabSeparator", "sap/m/BusyIndicator",
        "sap/ui/layout/form/SimpleForm", "sap/ui/core/library",
        "sap/ui/model/json/JSONModel", "sap/ui/core/HTML",
        "sap/ui/layout/Grid", "sap/ui/layout/GridData",
        "sap/ui/core/Icon", "sap/m/MessageBox"
      ], function(
        Shell, App, Page, IconTabBar,
        IconTabFilter, Button, Input, Label,
        Switch, Text, Title, List,
        StandardListItem, CustomListItem, Dialog,
        MessageToast, VBox, HBox, FlexBox,
        Panel, ObjectStatus, ObjectNumber,
        SearchField, Toolbar, ToolbarSpacer,
        CheckBox, ScrollContainer, ObjectIdentifier,
        Bar, OverflowToolbar, GenericTag,
        ObjectAttribute, Link, MessageStrip,
        TextArea, StepInput, Slider,
        SplitContainer, IconTabSeparator, BusyIndicator,
        SimpleForm, coreLib,
        JSONModel, HTML,
        Grid, GridData,
        Icon, MessageBox
      ) {

        var TitleLevel = coreLib.TitleLevel;
        var ValueState = coreLib.ValueState;

        // ── Models ──────────────────────────────────────────────────
        var oModel = new JSONModel({
          services: [],
          credentials: {},
          tools: [],
          bridge: { running: false, pid: null },
          bridgeLogs: [],
          showBridgeLogs: false,
          starting: false,
          selectedToolIdx: -1,
          toolSearch: "",
          toolArgs: {},
          toolAuth: "",
          toolResult: null,
          toolCalling: false,
          mcpPort: 7777,
          loginForm: { api: "https://api.cf.eu10.hana.ondemand.com", username: "", password: "", org: "", space: "" },
          loginLoading: false,
          loginRes: null,
          checklist: null,
          checkLoading: false,
          deploying: false,
          deployLogs: [],
          deployExit: null,
          modalOpen: false,
          modalEditIdx: -1,
          modalForm: {},
          probing: false,
          probeResult: null,
          selEs: [],
          selAct: [],
          cfApp: null,
          btpHealth: null
        });
        oModel.setSizeLimit(5000);

        // ── Escape HTML helper ──────────────────────────────────────
        function esc(s) {
          return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        // ── API helper ──────────────────────────────────────────────
        // If CONFIGURATOR_TOKEN is set, the UI reads it from
        // ?token=<value> query param and includes it as Bearer token.
        var _cfgToken = (new URLSearchParams(window.location.search)).get("token") || "";

        function callApi(method, path, body) {
          var hdrs = { "Content-Type": "application/json" };
          if (_cfgToken) hdrs["Authorization"] = "Bearer " + _cfgToken;
          var opts = { method: method, headers: hdrs };
          if (body !== undefined) opts.body = JSON.stringify(body);
          return fetch(path, opts).then(function(r) {
            if (r.status === 401) {
              MessageToast.show("Unauthorized — provide ?token=<CONFIGURATOR_TOKEN> in the URL");
              return {};
            }
            return r.json();
          });
        }

        // ── Data loaders ────────────────────────────────────────────
        function loadServices()    { callApi("GET", "/api/services").then(function(d)    { oModel.setProperty("/services", d); }); }
        function loadCredentials() { callApi("GET", "/api/credentials").then(function(d) { oModel.setProperty("/credentials", d); }); }
        function loadTools()       { callApi("GET", "/api/tools").then(function(d)       { oModel.setProperty("/tools", d.tools || []); }); }
        function checkBridge() {
          callApi("GET", "/api/bridge/status").then(function(d) {
            var wasStopped = !oModel.getProperty("/bridge/running");
            oModel.setProperty("/bridge", d);
            if (d.running && wasStopped) loadTools();
            if (!d.running) oModel.setProperty("/tools", []);
          });
        }
        function loadChecklist() {
          oModel.setProperty("/checkLoading", true);
          callApi("GET", "/api/cf/checklist").then(function(d) {
            oModel.setProperty("/checklist", d);
            oModel.setProperty("/checkLoading", false);
          });
        }
        function loadCfApp()     { callApi("GET", "/api/cf/app").then(function(d)     { oModel.setProperty("/cfApp", d); }); }
        function loadBtpHealth() { callApi("GET", "/api/btp/health").then(function(d) { oModel.setProperty("/btpHealth", d); }); }

        loadServices(); loadCredentials(); checkBridge(); loadChecklist(); loadCfApp(); loadBtpHealth();
        setInterval(checkBridge, 3000);

        // ── Filtered tools helper ───────────────────────────────────
        function getFilteredTools() {
          var q = (oModel.getProperty("/toolSearch") || "").toLowerCase();
          return (oModel.getProperty("/tools") || []).filter(function(t) {
            return t.name.toLowerCase().indexOf(q) >= 0 ||
                   (t.description || "").toLowerCase().indexOf(q) >= 0;
          });
        }

        // ═════════════════════════════════════════════════════════════
        //  TAB 1: Services
        // ═════════════════════════════════════════════════════════════

        // BTP Status Panel
        var oBtpPanel = new Panel({
          headerText: "Deployed App — jam-odata-mcp-bridge",
          expandable: false,
          content: [
            new HBox({ alignItems: "Center", items: [
              new ObjectStatus({
                text: { path: "/cfApp/state", formatter: function(v) { return v || "unknown"; } },
                state: { path: "/cfApp/state", formatter: function(v) {
                  return v && v.toLowerCase() === "started" ? ValueState.Success : ValueState.Error;
                } }
              }),
              new Text({
                text: { path: "/cfApp/routes", formatter: function(v) { return v ? "https://" + v : "Not deployed"; } }
              }).addStyleClass("sapUiSmallMarginBegin"),
              new ToolbarSpacer(),
              new Button({ text: "Refresh", icon: "sap-icon://refresh", type: "Ghost",
                press: function() { loadCfApp(); loadBtpHealth(); }
              })
            ] }).addStyleClass("sapUiSmallMarginBottom"),
            new HTML({ content: { parts: ["/btpHealth", "/services"], formatter: function(btp, svcs) {
              if (!btp || !btp.ok) return '<div class="fieldMeta">' + esc(btp ? btp.error || "Could not reach BTP app" : "Loading...") + '</div>';
              var localSet = {}, btpSet = {};
              (svcs || []).forEach(function(s) { localSet[s.alias] = true; });
              (btp.services || []).forEach(function(s) { btpSet[s] = true; });
              var all = Object.keys(Object.assign({}, localSet, btpSet));
              return all.map(function(alias) {
                var inBtp = btpSet[alias], inLocal = localSet[alias];
                var color = inBtp && inLocal ? "#107e3e" : inBtp ? "#e9730c" : "#bb0000";
                var bg = inBtp && inLocal ? "#f0faf4" : inBtp ? "#fff8f0" : "#fff3f3";
                return '<span style="font-size:.75rem;padding:3px 10px;border-radius:4px;background:' + bg +
                  ';color:' + color + ';border:1px solid ' + color + '40;font-family:monospace;font-weight:600;margin-right:6px">' +
                  (inBtp ? "✓" : "✕") + " " + esc(alias) + '</span>';
              }).join("");
            } } })
          ]
        }).addStyleClass("sapUiSmallMarginBottom");

        // Service List
        var oServiceList = new List({
          noDataText: "No services configured. Add one to get started.",
          items: { path: "/services", template: new CustomListItem({
            content: [
              new VBox({ items: [
                new HBox({ alignItems: "Center", items: [
                  new ObjectIdentifier({ title: "{alias}", text: "{url}" }),
                  new ToolbarSpacer(),
                  new HBox({ items: [
                    new Button({ icon: "sap-icon://edit", type: "Ghost", tooltip: "Edit",
                      press: function(e) {
                        var idx = parseInt(e.getSource().getBindingContext().getPath().split("/").pop());
                        openServiceModal(idx, Object.assign({}, oModel.getProperty("/services/" + idx)));
                      }
                    }),
                    new Button({ icon: "sap-icon://delete", type: "Reject", tooltip: "Delete",
                      press: function(e) {
                        var idx = parseInt(e.getSource().getBindingContext().getPath().split("/").pop());
                        MessageBox.confirm("Delete this service?", {
                          onClose: function(action) {
                            if (action === "OK") {
                              var arr = oModel.getProperty("/services").filter(function(_, i) { return i !== idx; });
                              callApi("PUT", "/api/services", arr).then(function() { loadServices(); MessageToast.show("Service deleted"); });
                            }
                          }
                        });
                      }
                    })
                  ] })
                ] }),
                new HTML({ content: { parts: [{ path: "passthrough" }, { path: "readonly" }, { path: "include" }, { path: "include_actions" }, { path: "default_top" }],
                  formatter: function(pt, ro, inc, incA, dt) {
                    var tags = [];
                    if (pt) tags.push('<span style="background:#fff8f0;color:#e9730c;padding:2px 8px;border-radius:12px;font-size:.6875rem;font-weight:600;margin-right:4px">passthrough</span>');
                    if (ro) tags.push('<span style="background:#f0f0f0;color:#6a6d70;padding:2px 8px;border-radius:12px;font-size:.6875rem;font-weight:600;margin-right:4px">read-only</span>');
                    if (inc) tags.push('<span style="background:#e8f5ec;color:#107e3e;padding:2px 8px;border-radius:12px;font-size:.6875rem;font-weight:600;margin-right:4px">' + inc.length + ' entities</span>');
                    if (incA) tags.push('<span style="background:#e8f5ec;color:#107e3e;padding:2px 8px;border-radius:12px;font-size:.6875rem;font-weight:600;margin-right:4px">' + incA.length + ' actions</span>');
                    if (dt && dt !== 50) tags.push('<span style="background:#f0f0f0;color:#6a6d70;padding:2px 8px;border-radius:12px;font-size:.6875rem;font-weight:600;margin-right:4px">top=' + dt + '</span>');
                    return '<div style="margin-top:4px">' + tags.join("") + '</div>';
                  }
                } })
              ] })
            ],
            type: "Inactive"
          }) }
        });

        // Service Modal
        function blankForm() {
          return { alias: "", url: "", username: "${ODATA_USERNAME}", password: "${ODATA_PASSWORD}", passthrough: true, readonly: false, default_top: 50 };
        }

        var oEntityList = new List({ noDataText: "Probe the service first" });
        var oActionList = new List({ noDataText: "No actions found" });

        function openServiceModal(idx, data) {
          oModel.setProperty("/modalEditIdx", idx);
          oModel.setProperty("/modalForm", data || blankForm());
          oModel.setProperty("/probeResult", null);
          oModel.setProperty("/selEs", []);
          oModel.setProperty("/selAct", []);
          oEntityList.destroyItems();
          oActionList.destroyItems();
          oServiceDialog.open();
        }

        var oServiceDialog = new Dialog({
          title: { path: "/modalEditIdx", formatter: function(v) { return v === -1 ? "Add Service" : "Edit Service"; } },
          contentWidth: "38rem",
          verticalScrolling: true,
          content: [
            new SimpleForm({ editable: true, layout: "ResponsiveGridLayout",
              labelSpanXL: 4, labelSpanL: 4, labelSpanM: 4, labelSpanS: 12,
              content: [
                new Label({ text: "Alias", required: true }),
                new Input({ value: "{/modalForm/alias}", placeholder: "e.g. sales_order" }),
                new Label({ text: "OData URL", required: true }),
                new Input({ value: "{/modalForm/url}", placeholder: "https://host/sap/opu/odata4/..." }),
                new Label({ text: "Username" }),
                new Input({ value: "{/modalForm/username}", placeholder: "${ODATA_USERNAME}" }),
                new Label({ text: "Password" }),
                new Input({ value: "{/modalForm/password}", type: "Password", placeholder: "${ODATA_PASSWORD}" }),
                new Label({ text: "Passthrough Auth" }),
                new Switch({ state: "{/modalForm/passthrough}", customTextOn: "On", customTextOff: "Off" }),
                new Label({ text: "Read-only" }),
                new Switch({ state: "{/modalForm/readonly}", customTextOn: "On", customTextOff: "Off" }),
                new Label({ text: "Default Result Limit" }),
                new StepInput({ value: "{/modalForm/default_top}", min: 1, max: 10000, step: 10 })
              ]
            }),
            new Toolbar({ content: [
              new Title({ text: "Entity & Action Filter", level: TitleLevel.H5 }),
              new ToolbarSpacer(),
              new Button({ text: "Test Connection & Probe", icon: "sap-icon://search", type: "Ghost",
                enabled: { path: "/probing", formatter: function(v) { return !v; } },
                press: function() {
                  oModel.setProperty("/probing", true);
                  callApi("POST", "/api/probe", oModel.getProperty("/modalForm")).then(function(res) {
                    oModel.setProperty("/probeResult", res);
                    if (res.success) {
                      var allEs = res.entity_sets.map(function(e) { return e.name; });
                      var allAct = res.actions || [];
                      var form = oModel.getProperty("/modalForm");
                      oModel.setProperty("/selEs", form.include && form.include.length ? form.include.slice() : allEs.slice());
                      oModel.setProperty("/selAct", form.include_actions && form.include_actions.length ? form.include_actions.slice() : allAct.slice());
                      oEntityList.destroyItems();
                      res.entity_sets.forEach(function(esItem) {
                        oEntityList.addItem(new CustomListItem({ content: [
                          new CheckBox({
                            text: esItem.name + (esItem.keys && esItem.keys.length ? " [" + esItem.keys.join(",") + "]" : "") + (esItem.prop_count ? " · " + esItem.prop_count + " fields" : ""),
                            selected: oModel.getProperty("/selEs").indexOf(esItem.name) >= 0,
                            select: function(evt) {
                              var arr = oModel.getProperty("/selEs").slice();
                              var nm = esItem.name;
                              if (evt.getParameter("selected")) { arr.push(nm); }
                              else { arr = arr.filter(function(x) { return x !== nm; }); }
                              oModel.setProperty("/selEs", arr);
                            }
                          })
                        ] }));
                      });
                      oActionList.destroyItems();
                      allAct.forEach(function(act) {
                        oActionList.addItem(new CustomListItem({ content: [
                          new CheckBox({
                            text: act,
                            selected: oModel.getProperty("/selAct").indexOf(act) >= 0,
                            select: function(evt) {
                              var arr = oModel.getProperty("/selAct").slice();
                              if (evt.getParameter("selected")) { arr.push(act); }
                              else { arr = arr.filter(function(x) { return x !== act; }); }
                              oModel.setProperty("/selAct", arr);
                            }
                          })
                        ] }));
                      });
                    }
                    oModel.setProperty("/probing", false);
                  });
                }
              })
            ] }).addStyleClass("sapUiSmallMarginTop"),
            new VBox({
              visible: { path: "/probeResult", formatter: function(v) { return v && !v.success; } },
              items: [
                new MessageStrip({
                  text: { path: "/probeResult/error", formatter: function(v) { return v || "Connection failed"; } },
                  type: "Error", showIcon: true
                })
              ]
            }).addStyleClass("sapUiTinyMarginTop"),
            new VBox({
              visible: { path: "/probeResult", formatter: function(v) { return v && v.success; } },
              items: [
                new Panel({ headerText: "Entity Sets", expandable: true, expanded: true, content: [
                  new HBox({ items: [
                    new Button({ text: "All", type: "Ghost", press: function() {
                      var res = oModel.getProperty("/probeResult");
                      if (res && res.entity_sets) {
                        oModel.setProperty("/selEs", res.entity_sets.map(function(e) { return e.name; }));
                        oEntityList.getItems().forEach(function(it) { it.getContent()[0].setSelected(true); });
                      }
                    } }),
                    new Button({ text: "None", type: "Ghost", press: function() {
                      oModel.setProperty("/selEs", []);
                      oEntityList.getItems().forEach(function(it) { it.getContent()[0].setSelected(false); });
                    } })
                  ] }),
                  new ScrollContainer({ height: "10rem", vertical: true, content: [ oEntityList ] })
                ] }),
                new Panel({ headerText: "Actions", expandable: true, expanded: false, content: [
                  new ScrollContainer({ height: "8rem", vertical: true, content: [ oActionList ] })
                ] })
              ]
            }).addStyleClass("sapUiTinyMarginTop")
          ],
          beginButton: new Button({ text: "Save", type: "Emphasized", icon: "sap-icon://save",
            press: function() {
              var form = Object.assign({}, oModel.getProperty("/modalForm"));
              var idx = oModel.getProperty("/modalEditIdx");
              if (!form.alias || !form.alias.trim() || !form.url || !form.url.trim()) {
                MessageToast.show("Alias and URL are required"); return;
              }
              if (form.default_top === 50) delete form.default_top;
              var probe = oModel.getProperty("/probeResult");
              if (probe && probe.success) {
                var allEs = probe.entity_sets.map(function(e) { return e.name; });
                var allAct = probe.actions || [];
                var selEs = oModel.getProperty("/selEs");
                var selAct = oModel.getProperty("/selAct");
                if (selEs.length < allEs.length) form.include = selEs; else delete form.include;
                if (selAct.length < allAct.length) form.include_actions = selAct; else delete form.include_actions;
              }
              var svcs = oModel.getProperty("/services").slice();
              if (idx === -1) svcs.push(form); else svcs[idx] = form;
              callApi("PUT", "/api/services", svcs).then(function() {
                loadServices();
                oServiceDialog.close();
                MessageToast.show(idx === -1 ? "Service added" : "Service updated");
                if (oModel.getProperty("/bridge/running")) {
                  MessageToast.show("Restart the bridge to apply changes");
                }
              });
            }
          }),
          endButton: new Button({ text: "Cancel", press: function() { oServiceDialog.close(); } })
        });
        oServiceDialog.setModel(oModel);

        var oServicesPage = new VBox({ items: [
          new Toolbar({ content: [
            new Title({ text: "OData Services", level: TitleLevel.H4 }),
            new ToolbarSpacer(),
            new Button({ text: "Add Service", icon: "sap-icon://add", type: "Emphasized",
              press: function() { openServiceModal(-1, null); }
            })
          ] }).addStyleClass("sapUiSmallMarginBottom"),
          oBtpPanel,
          oServiceList
        ] });

        // ═════════════════════════════════════════════════════════════
        //  TAB 2: Credentials
        // ═════════════════════════════════════════════════════════════
        var oCredentialsPage = new VBox({ items: [
          new Panel({ headerText: "OData Service Credentials", content: [
            new SimpleForm({ editable: true, layout: "ResponsiveGridLayout",
              labelSpanXL: 4, labelSpanL: 4, labelSpanM: 4, labelSpanS: 12,
              content: [
                new Label({ text: "ODATA_USERNAME" }),
                new Input({ value: "{/credentials/ODATA_USERNAME}", placeholder: "SAP username — used as ${ODATA_USERNAME} in services.json" }),
                new Label({ text: "ODATA_PASSWORD" }),
                new Input({ value: "{/credentials/ODATA_PASSWORD}", type: "Password", placeholder: "SAP password" })
              ]
            })
          ] }).addStyleClass("sapUiSmallMarginBottom"),
          new Panel({ headerText: "MCP Gateway Credentials (optional)", content: [
            new MessageStrip({
              text: "Protect the /mcp endpoint. Use Bearer token, Basic Auth, or both — either grants access. Basic Auth credentials are forwarded to OData backends when passthrough is enabled (principal propagation).",
              type: "Information", showIcon: true
            }).addStyleClass("sapUiSmallMarginBottom"),
            new SimpleForm({ editable: true, layout: "ResponsiveGridLayout",
              labelSpanXL: 4, labelSpanL: 4, labelSpanM: 4, labelSpanS: 12,
              content: [
                new Label({ text: "MCP_TOKEN" }),
                new Input({ value: "{/credentials/MCP_TOKEN}", type: "Password", placeholder: "Bearer token for machine clients (Authorization: Bearer <token>)" }),
                new Label({ text: "MCP_USERNAME" }),
                new Input({ value: "{/credentials/MCP_USERNAME}", placeholder: "Basic auth username — forwarded to OData when passthrough is on" }),
                new Label({ text: "MCP_PASSWORD" }),
                new Input({ value: "{/credentials/MCP_PASSWORD}", type: "Password", placeholder: "Basic auth password" })
              ]
            })
          ] }).addStyleClass("sapUiSmallMarginBottom"),
          new Button({ text: "Save Credentials", icon: "sap-icon://save", type: "Emphasized",
            press: function() {
              callApi("PUT", "/api/credentials", oModel.getProperty("/credentials")).then(function() {
                loadCredentials();
                MessageToast.show("Credentials saved");
              });
            }
          })
        ] });

        // ═════════════════════════════════════════════════════════════
        //  TAB 3: Test Tools
        // ═════════════════════════════════════════════════════════════
        var oToolList = new List({
          mode: "SingleSelectMaster",
          noDataText: "No tools available",
          selectionChange: function(e) {
            var item = e.getParameter("listItem");
            if (!item) return;
            var idx = oToolList.indexOfItem(item);
            oModel.setProperty("/selectedToolIdx", idx);
            oModel.setProperty("/toolArgs", {});
            oModel.setProperty("/toolResult", null);
            oToolResultHtml.setContent("");
            renderToolForm();
          }
        });

        var oToolSearchField = new SearchField({
          placeholder: "Search tools...",
          liveChange: function(e) {
            oModel.setProperty("/toolSearch", e.getParameter("newValue"));
            oModel.setProperty("/selectedToolIdx", -1);
            oToolFormContainer.destroyItems();
            oToolResultHtml.setContent("");
            refreshToolList();
          }
        });

        var oToolFormContainer = new VBox();
        var oToolResultHtml = new HTML({ content: "" });

        function refreshToolList() {
          var filtered = getFilteredTools();
          oToolList.destroyItems();
          filtered.forEach(function(t) {
            oToolList.addItem(new StandardListItem({
              title: t.name,
              description: (t.description || "").substring(0, 120),
              type: "Active"
            }));
          });
        }

        function renderToolForm() {
          oToolFormContainer.destroyItems();
          var idx = oModel.getProperty("/selectedToolIdx");
          var filtered = getFilteredTools();
          if (idx < 0 || idx >= filtered.length) {
            oToolFormContainer.addItem(new MessageStrip({ text: "Select a tool from the list to test it.", type: "Information", showIcon: true }));
            return;
          }
          var tool = filtered[idx];
          var props = (tool.inputSchema && tool.inputSchema.properties) || {};
          var required = (tool.inputSchema && tool.inputSchema.required) || [];

          oToolFormContainer.addItem(new Title({ text: tool.name, level: TitleLevel.H4 }).addStyleClass("toolNameMono"));
          oToolFormContainer.addItem(new Text({ text: tool.description || "" }).addStyleClass("sapUiSmallMarginBottom"));

          var keys = Object.keys(props);
          if (keys.length === 0) {
            oToolFormContainer.addItem(new MessageStrip({ text: "No input parameters.", type: "Information" }));
          } else {
            var oForm = new SimpleForm({ editable: true, layout: "ResponsiveGridLayout",
              labelSpanXL: 3, labelSpanL: 4, labelSpanM: 4, labelSpanS: 12, content: [] });
            keys.forEach(function(name) {
              var prop = props[name];
              var type = prop.type || "string";
              var isReq = required.indexOf(name) >= 0;
              oForm.addContent(new Label({ text: name + (isReq ? " *" : ""), tooltip: prop.description || name }));
              if (type === "boolean") {
                oForm.addContent(new Switch({
                  state: false,
                  customTextOn: "true", customTextOff: "false",
                  change: function(evt) {
                    var args = Object.assign({}, oModel.getProperty("/toolArgs"));
                    args[name] = evt.getParameter("state");
                    oModel.setProperty("/toolArgs", args);
                  }
                }));
              } else if (type === "integer" || type === "number") {
                oForm.addContent(new Input({
                  type: "Number",
                  placeholder: (prop.description || name).substring(0, 120),
                  liveChange: function(evt) {
                    var args = Object.assign({}, oModel.getProperty("/toolArgs"));
                    var v = evt.getParameter("value");
                    args[name] = v === "" ? undefined : Number(v);
                    oModel.setProperty("/toolArgs", args);
                  }
                }));
              } else {
                oForm.addContent(new Input({
                  placeholder: (prop.description || name).substring(0, 120),
                  liveChange: function(evt) {
                    var args = Object.assign({}, oModel.getProperty("/toolArgs"));
                    args[name] = evt.getParameter("value");
                    oModel.setProperty("/toolArgs", args);
                  }
                }));
              }
            });
            oToolFormContainer.addItem(oForm);
          }

          // Auth header
          oToolFormContainer.addItem(new Label({ text: "Authorization Header (for passthrough)" }).addStyleClass("sapUiSmallMarginTop"));
          oToolFormContainer.addItem(new Input({
            type: "Password", placeholder: "Basic dXNlcjpwYXNz",
            value: oModel.getProperty("/toolAuth"),
            liveChange: function(evt) { oModel.setProperty("/toolAuth", evt.getParameter("value")); }
          }));

          // Call button
          oToolFormContainer.addItem(new Button({
            text: "Call Tool", icon: "sap-icon://begin", type: "Emphasized",
            enabled: oModel.getProperty("/bridge/running"),
            press: function() { handleCallTool(); }
          }).addStyleClass("sapUiSmallMarginTop sapUiSmallMarginBottom"));
        }

        function handleCallTool() {
          var idx = oModel.getProperty("/selectedToolIdx");
          var filtered = getFilteredTools();
          if (idx < 0 || idx >= filtered.length) return;
          var tool = filtered[idx];
          var args = oModel.getProperty("/toolArgs") || {};
          var cleanArgs = {};
          Object.keys(args).forEach(function(k) {
            if (args[k] !== undefined && args[k] !== "") cleanArgs[k] = args[k];
          });
          oModel.setProperty("/toolCalling", true);
          oToolResultHtml.setContent('<div class="responsePanel">Calling...</div>');
          callApi("POST", "/api/tools/call", {
            name: tool.name,
            arguments: cleanArgs,
            auth: oModel.getProperty("/toolAuth") || ""
          }).then(function(res) {
            oModel.setProperty("/toolResult", res);
            oModel.setProperty("/toolCalling", false);
            var display;
            try {
              var text = res && res.result && res.result.content && res.result.content[0] && res.result.content[0].text;
              if (text) display = JSON.stringify(JSON.parse(text), null, 2);
            } catch(e) { /* not JSON text */ }
            if (!display) display = JSON.stringify(res, null, 2);
            oToolResultHtml.setContent('<div class="responsePanel"><pre>' + esc(display) + '</pre></div>');
          });
        }

        // Bridge control bar
        var oBridgeBar = new Toolbar({
          content: [
            new ObjectStatus({
              text: { path: "/bridge/running", formatter: function(v) { return v ? "Running" : "Stopped"; } },
              state: { path: "/bridge/running", formatter: function(v) { return v ? ValueState.Success : ValueState.Error; } },
              icon: { path: "/bridge/running", formatter: function(v) { return v ? "sap-icon://connected" : "sap-icon://disconnected"; } }
            }),
            new Text({ text: { parts: ["/bridge/running", "/bridge/pid", "/mcpPort"],
              formatter: function(r, pid, port) {
                return r ? "MCP Bridge on port " + port + " (PID " + pid + ")" : "MCP Bridge is not running";
              }
            } }).addStyleClass("sapUiSmallMarginBegin"),
            new ToolbarSpacer(),
            new Button({ text: "Start Bridge", icon: "sap-icon://begin", type: "Accept",
              visible: { path: "/bridge/running", formatter: function(v) { return !v; } },
              enabled: { path: "/starting", formatter: function(v) { return !v; } },
              press: function() {
                oModel.setProperty("/starting", true);
                oModel.setProperty("/bridgeLogs", []);
                callApi("POST", "/api/bridge/start", {}).then(function(res) {
                  if (res.ok) {
                    MessageToast.show("Bridge started (PID " + res.pid + ")");
                    setTimeout(function() {
                      checkBridge();
                      setTimeout(function() { loadTools(); refreshToolList(); }, 1500);
                    }, 800);
                  } else {
                    MessageToast.show(res.error || "Failed to start bridge");
                    callApi("GET", "/api/bridge/logs").then(function(d) {
                      oModel.setProperty("/bridgeLogs", d.logs || []);
                      oModel.setProperty("/showBridgeLogs", true);
                    });
                  }
                  oModel.setProperty("/starting", false);
                });
              }
            }),
            new Button({ text: "Stop", icon: "sap-icon://stop", type: "Reject",
              visible: "{/bridge/running}",
              press: function() {
                callApi("POST", "/api/bridge/stop", {}).then(function() {
                  checkBridge(); MessageToast.show("Bridge stopped");
                });
              }
            }),
            new Button({ text: "Refresh Tools", icon: "sap-icon://refresh", type: "Ghost",
              visible: "{/bridge/running}",
              press: function() { loadTools(); setTimeout(refreshToolList, 500); }
            })
          ]
        }).addStyleClass("sapUiSmallMarginBottom");

        var oBridgeLogsPanel = new Panel({
          headerText: "Bridge Startup Log",
          expandable: true,
          expanded: "{/showBridgeLogs}",
          visible: { path: "/bridgeLogs", formatter: function(v) { return v && v.length > 0; } },
          content: [
            new HTML({ content: { path: "/bridgeLogs", formatter: function(logs) {
              if (!logs || !logs.length) return "";
              return '<div class="bridgeLogPanel">' + logs.map(function(l) {
                var cls = (l.indexOf("ERROR") >= 0 || l.indexOf("Traceback") >= 0) ? "logErr" : "";
                return '<div class="' + cls + '">' + esc(l) + '</div>';
              }).join("") + '</div>';
            } } })
          ]
        }).addStyleClass("sapUiSmallMarginBottom");

        var oBridgeWarning = new MessageStrip({
          text: "Start the MCP bridge to load and test tools. The bridge reads services.json and connects to your OData endpoints.",
          type: "Warning", showIcon: true,
          visible: { path: "/bridge/running", formatter: function(v) { return !v; } }
        }).addStyleClass("sapUiSmallMarginBottom");

        var oToolsPage = new VBox({ items: [
          oBridgeBar,
          oBridgeLogsPanel,
          oBridgeWarning,
          new HBox({ items: [
            new VBox({ items: [
              oToolSearchField,
              new ScrollContainer({ height: "28rem", vertical: true, content: [ oToolList ] })
            ] }).addStyleClass("sapUiSmallMarginEnd").setLayoutData(new sap.m.FlexItemData({ growFactor: 1, baseSize: "22rem" })),
            new VBox({ items: [
              oToolFormContainer,
              oToolResultHtml
            ] }).setLayoutData(new sap.m.FlexItemData({ growFactor: 2 }))
          ] }).addStyleClass("sapUiSmallMarginTop")
        ] });

        // ═════════════════════════════════════════════════════════════
        //  TAB 4: Deploy
        // ═════════════════════════════════════════════════════════════
        var oDeployLogsHtml = new HTML({ content: "" });

        // CF Login Panel
        var oCfLoginPanel = new Panel({
          headerText: "Cloud Foundry Login",
          content: [
            // Logged-in view
            new VBox({
              visible: { path: "/checklist/logged_in/ok", formatter: function(v) { return v === true; } },
              items: [
                new HBox({ alignItems: "Center", items: [
                  new ObjectStatus({ text: "Logged in", state: ValueState.Success, icon: "sap-icon://accept" }),
                  new ToolbarSpacer(),
                  new Button({ text: "Refresh", icon: "sap-icon://refresh", type: "Ghost", press: function() { loadChecklist(); } }),
                  new Button({ text: "Logout", type: "Reject", press: function() {
                    callApi("POST", "/api/cf/logout", {}).then(function(res) {
                      MessageToast.show(res.ok ? "Logged out from CF" : (res.output || "Logout failed"));
                      loadChecklist();
                    });
                  } })
                ] }),
                new HTML({ content: { path: "/checklist/logged_in/detail", formatter: function(detail) {
                  if (!detail) return "";
                  var user = (detail.match(/user:\s+(.+)/i) || [])[1] || "";
                  var org = (detail.match(/org:\s+(.+)/i) || [])[1] || "";
                  var space = (detail.match(/space:\s+(.+)/i) || [])[1] || "";
                  var apiEp = (detail.match(/api endpoint:\s+(.+)/i) || [])[1] || "";
                  return '<div style="margin-top:.5rem;font-size:.8125rem">' +
                    (user ? "👤 " + esc(user.trim()) + "&nbsp;&nbsp;" : "") +
                    (apiEp ? "🔗 " + esc(apiEp.trim()) + "&nbsp;&nbsp;" : "") +
                    (org ? "🏢 " + esc(org.trim()) + "&nbsp;&nbsp;" : "") +
                    (space ? "📁 " + esc(space.trim()) : "") + '</div>';
                } } })
              ]
            }),
            // Login form
            new VBox({
              visible: { path: "/checklist/logged_in/ok", formatter: function(v) { return v !== true; } },
              items: [
                new SimpleForm({ editable: true, layout: "ResponsiveGridLayout",
                  labelSpanXL: 3, labelSpanL: 3, labelSpanM: 4, labelSpanS: 12,
                  content: [
                    new Label({ text: "CF API Endpoint", required: true }),
                    new Input({ value: "{/loginForm/api}", placeholder: "https://api.cf.eu10.hana.ondemand.com" }),
                    new Label({ text: "Username", required: true }),
                    new Input({ value: "{/loginForm/username}", placeholder: "user@example.com" }),
                    new Label({ text: "Password", required: true }),
                    new Input({ value: "{/loginForm/password}", type: "Password" }),
                    new Label({ text: "Org" }),
                    new Input({ value: "{/loginForm/org}", placeholder: "my-org" }),
                    new Label({ text: "Space" }),
                    new Input({ value: "{/loginForm/space}", placeholder: "dev" })
                  ]
                }),
                new Button({ text: "Login to CF", icon: "sap-icon://locked", type: "Emphasized",
                  enabled: { path: "/loginLoading", formatter: function(v) { return !v; } },
                  press: function() {
                    var form = oModel.getProperty("/loginForm");
                    if (!form.api || !form.username || !form.password) {
                      MessageToast.show("API endpoint, username and password are required");
                      return;
                    }
                    oModel.setProperty("/loginLoading", true);
                    oModel.setProperty("/loginRes", { output: "Connecting to CF — this may take 20–60 seconds..." });
                    callApi("POST", "/api/cf/login", form).then(function(res) {
                      oModel.setProperty("/loginRes", res);
                      if (res.ok) { MessageToast.show("Logged in to CF"); loadChecklist(); }
                      else { MessageToast.show("CF login failed"); }
                      oModel.setProperty("/loginLoading", false);
                    }).catch(function(e) {
                      oModel.setProperty("/loginRes", { output: "Network error: " + e.message });
                      oModel.setProperty("/loginLoading", false);
                    });
                  }
                })
              ]
            }),
            // Login output
            new Panel({
              headerText: "Login Output",
              expandable: true, expanded: false,
              visible: { path: "/loginRes", formatter: function(v) { return !!v; } },
              content: [
                new HTML({ content: { path: "/loginRes", formatter: function(v) {
                  if (!v) return "";
                  return '<div class="bridgeLogPanel">' + esc(v.output || "") + '</div>';
                } } })
              ]
            })
          ]
        }).addStyleClass("sapUiSmallMarginBottom");

        // Checklist Panel
        var oChecklistPanel = new Panel({
          headerText: "Pre-Deploy Checklist",
          content: [
            new Toolbar({ content: [
              new ToolbarSpacer(),
              new Button({ text: "Refresh", icon: "sap-icon://refresh", type: "Ghost",
                press: function() { loadChecklist(); } })
            ] }),
            new HTML({ content: { path: "/checklist", formatter: function(cl) {
              if (!cl) return '<div style="padding:.5rem;color:#6a6d70">Loading...</div>';
              var checks = [
                { label: "CF CLI installed", ok: cl.cli && cl.cli.ok, detail: cl.cli ? cl.cli.detail : "" },
                { label: "Logged in to Cloud Foundry", ok: cl.logged_in && cl.logged_in.ok, detail: cl.logged_in && cl.logged_in.ok ? "Logged in" : "Not logged in" },
                { label: "credentials.mtaext saved", ok: cl.creds && cl.creds.ok, detail: cl.creds ? cl.creds.detail : "" },
                { label: "Services configured", ok: cl.services && cl.services.ok, detail: cl.services ? cl.services.detail : "" },
                { label: "App deployed & running", ok: cl.app && cl.app.ok,
                  detail: cl.app && cl.app.routes ? "https://" + cl.app.routes + " (" + cl.app.state + ")" :
                          cl.app && cl.app.deployed === false ? "Not yet deployed" : (cl.app ? cl.app.state || "" : "") }
              ];
              return checks.map(function(c) {
                var icon = c.ok === true ? "✓" : c.ok === false ? "✕" : "○";
                var color = c.ok === true ? "#107e3e" : c.ok === false ? "#bb0000" : "#6a6d70";
                return '<div style="display:flex;align-items:center;gap:10px;padding:6px 0">' +
                  '<span style="color:' + color + ';font-weight:700;font-size:1rem;width:1.5rem;text-align:center">' + icon + '</span>' +
                  '<div style="flex:1"><div>' + esc(c.label) + '</div>' +
                  (c.detail ? '<div style="font-size:.6875rem;color:#6a6d70;margin-top:2px">' + esc(c.detail) + '</div>' : "") +
                  '</div></div>';
              }).join("");
            } } })
          ]
        }).addStyleClass("sapUiSmallMarginBottom");

        // Deploy button + log
        var oDeploySection = new VBox({ items: [
          new HBox({ alignItems: "Center", items: [
            new Button({ text: "Deploy to BTP", icon: "sap-icon://upload-to-cloud", type: "Emphasized",
              enabled: { path: "/checklist/logged_in/ok", formatter: function(v) { return v === true; } },
              press: function() {
                oModel.setProperty("/deployLogs", []);
                oModel.setProperty("/deployExit", null);
                oModel.setProperty("/deploying", true);
                oDeployLogsHtml.setContent('<div class="bridgeLogPanel">Starting...</div>');
                var logs = [];
                var es = new EventSource("/api/deploy");
                es.onmessage = function(e) {
                  var d = JSON.parse(e.data);
                  if (d.line !== undefined) {
                    logs.push(d.line);
                    var html = logs.map(function(l) {
                      var cls = l.indexOf("ERROR") >= 0 ? "logErr" : "";
                      return '<div class="' + cls + '">' + esc(l) + '</div>';
                    }).join("");
                    oDeployLogsHtml.setContent('<div class="bridgeLogPanel">' + html + '</div>');
                  }
                  if (d.exit !== undefined) {
                    oModel.setProperty("/deploying", false);
                    oModel.setProperty("/deployExit", d.exit);
                    es.close();
                    loadChecklist();
                    MessageToast.show(d.exit === 0 ? "Deployment successful!" : "Deployment failed — check logs");
                  }
                };
                es.onerror = function() {
                  logs.push("ERROR: Connection to deploy stream lost");
                  oModel.setProperty("/deploying", false);
                  oModel.setProperty("/deployExit", 1);
                  es.close();
                };
              }
            }),
            new Text({
              text: { path: "/checklist/logged_in/ok", formatter: function(v) { return v !== true ? "Log in to CF first" : ""; } }
            }).addStyleClass("sapUiSmallMarginBegin"),
            new ObjectStatus({
              visible: { path: "/deployExit", formatter: function(v) { return v !== null && v !== undefined; } },
              text: { path: "/deployExit", formatter: function(v) { return v === 0 ? "Success" : "Exit " + v; } },
              state: { path: "/deployExit", formatter: function(v) { return v === 0 ? ValueState.Success : ValueState.Error; } }
            }).addStyleClass("sapUiSmallMarginBegin")
          ] }).addStyleClass("sapUiSmallMarginBottom"),
          new Panel({
            headerText: "Deploy Log",
            expandable: true, expanded: true,
            visible: { parts: ["/deploying", "/deployExit"], formatter: function(d, e) { return d || e !== null; } },
            content: [ oDeployLogsHtml ]
          })
        ] });

        var oDeployPage = new VBox({ items: [
          oCfLoginPanel,
          oChecklistPanel,
          oDeploySection
        ] });

        // ═════════════════════════════════════════════════════════════
        //  Main App
        // ═════════════════════════════════════════════════════════════
        var oPage = new Page({
          customHeader: new Bar({
            contentLeft: [
              new Icon({ src: "sap-icon://connected", color: "#fff" }).addStyleClass("sapUiSmallMarginEnd"),
              new Title({ text: "JAM OData MCP Bridge — Configurator", level: TitleLevel.H4 })
            ],
            contentRight: [
              new ObjectStatus({
                text: { path: "/bridge/running", formatter: function(v) { return v ? "Bridge Running" : "Bridge Stopped"; } },
                state: { path: "/bridge/running", formatter: function(v) { return v ? ValueState.Success : ValueState.Error; } },
                icon: { path: "/bridge/running", formatter: function(v) { return v ? "sap-icon://accept" : "sap-icon://decline"; } }
              }),
              new Button({ text: "Start", icon: "sap-icon://begin", type: "Accept",
                visible: { path: "/bridge/running", formatter: function(v) { return !v; } },
                press: function() {
                  callApi("POST", "/api/bridge/start", {}).then(function(res) {
                    if (res.ok) { MessageToast.show("Bridge started"); setTimeout(checkBridge, 600); }
                    else MessageToast.show(res.error || "Failed");
                  });
                }
              }),
              new Button({ text: "Stop", icon: "sap-icon://stop", type: "Reject",
                visible: "{/bridge/running}",
                press: function() {
                  callApi("POST", "/api/bridge/stop", {}).then(function() { checkBridge(); MessageToast.show("Bridge stopped"); });
                }
              })
            ]
          }),
          content: [
            new IconTabBar({
              expandable: false,
              stretchContentHeight: true,
              items: [
                new IconTabFilter({ key: "services", text: "Services", icon: "sap-icon://chain-link",
                  content: [ oServicesPage ]
                }),
                new IconTabFilter({ key: "credentials", text: "Credentials", icon: "sap-icon://key",
                  content: [ oCredentialsPage ]
                }),
                new IconTabFilter({ key: "tools", text: "Test Tools", icon: "sap-icon://wrench",
                  content: [ oToolsPage ]
                }),
                new IconTabFilter({ key: "deploy", text: "Deploy", icon: "sap-icon://upload-to-cloud",
                  content: [ oDeployPage ]
                })
              ],
              select: function(e) {
                if (e.getParameter("key") === "tools" && oModel.getProperty("/bridge/running")) {
                  loadTools();
                  setTimeout(refreshToolList, 500);
                }
              }
            })
          ]
        });

        var oShell = new Shell({ app: new App({ pages: [ oPage ] }) });
        oShell.setModel(oModel);
        oShell.placeAt("content");
      });
    }
  </script>
</head>
<body class="sapUiBody" id="content"></body>
</html>
